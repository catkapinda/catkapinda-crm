services:
  - type: web
    name: crmcatkapinda
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: ./render_start.sh
    healthCheckPath: /_stcore/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_URL
        sync: false
